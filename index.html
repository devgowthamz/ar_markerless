<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Stable A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- Local aframe-ar -->
    <script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>
    <title>MarkLess</title>
</head>
<body>
<a-scene arjs="sourceType: webcam; facingMode: user; debugUIEnabled: false;">

    <a-camera>
        <a-ring
            id="circle"
            rotation="-90 0 0"
            radius-inner="0.01"
            radius-outer="0.02">
        </a-ring>
    </a-camera>

    <a-gltf-model 
        src="arCar.glb"
        position="0 0 -1"
        scale="0.2 0.2 0.2">
    </a-gltf-model>

</a-scene>
</body>
</html>
